<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agile Project Manager - Scrumban</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ---- Notification Bell ---- */
        .notif-btn { position: relative; }
        .notif-badge {
            position: absolute; top: -4px; right: -4px;
            background: #ef4444; color: #fff; border-radius: 50%;
            width: 18px; height: 18px; font-size: 10px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
        }
        /* ---- Dropdown panel ---- */
        .notif-panel {
            display: none; position: absolute; top: calc(100% + 10px); right: 0;
            background: var(--notif-bg, #fff);
            border: 1.5px solid var(--notif-border, #e2e8f0);
            border-radius: 14px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.18); width: 340px; z-index: 1000;
            overflow: hidden;
        }
        .notif-panel.open { display: block; }
        .notif-panel-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--notif-border, #f1f5f9);
            font-size: 14px; font-weight: 700;
            color: var(--notif-text, #0f172a);
            background: var(--notif-header-bg, #f8fafc);
            display: flex; align-items: center; justify-content: space-between;
        }
        .notif-list { max-height: 320px; overflow-y: auto; background: var(--notif-bg, #fff); }
        .notif-item {
            padding: 14px 18px;
            border-bottom: 1px solid var(--notif-border, #f1f5f9);
            display: flex; flex-direction: column; gap: 6px;
            background: var(--notif-bg, #fff);
        }
        .notif-item:last-child { border-bottom: none; }
        .notif-item-title { font-size: 13px; font-weight: 600; color: var(--notif-text, #1e293b); }
        .notif-item-sub { font-size: 12px; color: var(--notif-muted, #64748b); }
        .notif-item-sub strong { color: var(--notif-text, #1e293b); }
        .notif-item-actions { display: flex; gap: 8px; margin-top: 4px; }
        .btn-notif-accept {
            padding: 5px 14px; background: #007bff; color: #fff; border: none;
            border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif;
        }
        .btn-notif-accept:hover { opacity: 0.88; }
        .btn-notif-decline {
            padding: 5px 14px;
            background: var(--notif-decline-bg, #f1f5f9);
            color: var(--notif-muted, #64748b);
            border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif;
        }
        .btn-notif-decline:hover { background: #fef2f2; color: #dc2626; }
        .notif-empty { padding: 28px 18px; text-align: center; color: var(--notif-muted, #94a3b8); font-size: 13px; background: var(--notif-bg, #fff); }

        /* wrapper for bell positioning */
        .notif-wrapper { position: relative; }

        /* ---- Dark mode token overrides ---- */
        body.dark-mode {
            --notif-bg:         #161b22;
            --notif-header-bg:  #1c2333;
            --notif-border:     #30363d;
            --notif-text:       #e6edf3;
            --notif-muted:      #8b949e;
            --notif-decline-bg: #21262d;
        }
    </style>
</head>
<body>
    <div id="app">
        <header class="app-header" id="appHeader">

            <div class="header-left">
                <button class="btn-icon logo-btn" id="btnHome" title="Início">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                        <polyline points="2 17 12 22 22 17"></polyline>
                        <polyline points="2 12 12 17 22 12"></polyline>
                    </svg>
                </button>
                <h1 class="app-title">Scrumban Manager</h1>
                <nav class="breadcrumb" id="breadcrumb"></nav>
            </div>
            <div class="header-right" id="headerRight">
                <span id="userDisplay" class="user-display"></span>

                <!-- Sino de convites -->
                <div class="notif-wrapper" id="notifWrapper">
                    <button class="btn-icon notif-btn" id="btnNotif" title="Convites">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg>
                        <span class="notif-badge" id="notifBadge" style="display:none"></span>
                    </button>
                    <div class="notif-panel" id="notifPanel">
                        <div class="notif-panel-header">
                            <span>📩 Convites de equipe</span>
                        </div>
                        <div class="notif-list" id="notifList"></div>
                    </div>
                </div>

                <!-- Modo escuro -->
                <button class="btn-icon" id="btnDarkMode" title="Alternar modo escuro">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>

                <!-- Sair -->
                <button class="btn-icon" id="btnLogout" title="Sair">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </div>

            <!-- Hamburger: só visível em mobile -->
            <button class="btn-hamburger" id="btnHamburger" aria-label="Menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
        </header>

        <!-- Mobile drawer nav -->
        <div class="mobile-nav-drawer" id="mobileNavDrawer" role="navigation">
            <div id="mobileUserRow" style="display:flex;align-items:center;gap:12px;padding:8px 12px;margin-bottom:4px;">
                <span id="mobileUserDisplay" style="color:rgba(255,255,255,0.9);font-size:0.9rem;font-weight:600;flex:1;"></span>
            </div>
            <div class="mobile-nav-divider"></div>
            <button class="mobile-nav-item" id="mobileNotif">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
                Convites <span id="mobileNotifCount" style="margin-left:auto;background:#ef4444;color:#fff;border-radius:999px;padding:1px 8px;font-size:11px;font-weight:700;display:none"></span>
            </button>
            <button class="mobile-nav-item" id="mobileDarkMode">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                Modo Escuro
            </button>
            <div class="mobile-nav-divider"></div>
            <button class="mobile-nav-item" id="mobileLogout" style="color:#fca5a5;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Sair
            </button>
        </div>

        <!-- Overlay to close drawer -->
        <div id="drawerOverlay" style="display:none;position:fixed;inset:0;z-index:98;" onclick="App.closeDrawer()"></div>

        <main class="main-content" id="mainContent"></main>
        <div class="toast-container" id="toastContainer"></div>
    </div>

    <!-- Botão Guia Flutuante -->
    <button id="guideBtn" onclick="GuideView.open()" title="Guia de uso" style="
        position:fixed; bottom:24px; left:24px; z-index:1500;
        width:48px; height:48px; border-radius:50%;
        background:var(--primary); color:#fff; border:none;
        cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,0.25);
        display:flex; align-items:center; justify-content:center;
        font-size:22px; transition:transform 0.15s, box-shadow 0.15s;
    " onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
        ?
    </button>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent"></div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/Auth.js"></script>
    <script src="js/utils/Storage.js"></script>
    <script src="js/models/Project.js"></script>
    <script src="js/models/BacklogItem.js"></script>
    <script src="js/models/Sprint.js"></script>
    <script src="js/models/Ceremony.js"></script>
    <script src="js/views/HomeView.js"></script>
    <script src="js/views/ProjectView.js"></script>
    <script src="js/views/BacklogView.js"></script>
    <script src="js/views/SprintView.js"></script>
    <script src="js/views/KanbanView.js"></script>
    <script src="js/views/CeremonyView.js"></script>
    <script src="js/views/GuideView.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
